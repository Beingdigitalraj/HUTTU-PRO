<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUTTU PRO - Secure Admin Dashboard</title>
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: sans-serif; padding: 20px; }
        .panel { background-color: #181a20; padding: 20px; border-radius: 8px; border: 1px solid #2b2f36; }
        .btn { background-color: #f0b90b; color: black; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>👑 Master Admin Control</h1>
        <p>सुरक्षा के लिए, हमने API कीज़ वाला सिस्टम हटाकर Web3 वॉलेट कनेक्टिविटी जोड़ दी है।</p>
        
        <button class="btn" onclick="connectWallet()">1. Connect MetaMask Wallet</button>
        <button class="btn" style="background-color: #2ebd85;" onclick="claimEarnings()">2. Claim Commission</button>
    </div>

    <script>
        // वॉलेट कनेक्ट करने का फंक्शन
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    alert("Wallet Connected Successfully!");
                } catch (error) {
                    alert("Wallet Connection Failed");
                }
            } else {
                alert("कृपया MetaMask इंस्टॉल करें!");
            }
        }

        // कमीशन क्लेम करने का फंक्शन (यह आपके कॉन्ट्रैक्ट के withdrawEarnings से जुड़ेगा)
        function claimEarnings() {
            alert("स्मार्ट कॉन्ट्रैक्ट के साथ ट्रांजैक्शन शुरू हो रहा है... कृपया MetaMask में कन्फर्म करें।");
        }
    </script>
</body>
</html>
