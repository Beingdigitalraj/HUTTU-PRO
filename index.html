<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUTTU PRO - Secure Dashboard</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .panel-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .signal-panel { background: #181a20; padding: 15px; border-radius: 10px; width: 30%; border: 1px solid #333; }
        .chart-box { height: 300px; width: 100%; border: 1px solid #333; margin-bottom: 20px; }
        button { padding: 12px 25px; cursor: pointer; background: #f0b90b; border: none; font-weight: bold; border-radius: 5px; color: black; }
    </style>
</head>
<body>

    <h1>HUTTU PRO</h1>

    <!-- 1. चार्ट बॉक्स -->
    <div class="chart-box">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&theme=dark&style=1" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <!-- 2. तीन सिग्नल पैनल -->
    <div class="panel-container">
        <div class="signal-panel"><h4>Signal 1</h4><div id="signalDisplay1">Waiting...</div></div>
        <div class="signal-panel"><h4>Signal 2</h4><div id="signalDisplay2">Waiting...</div></div>
        <div class="signal-panel"><h4>Signal 3</h4><div id="signalDisplay3">Waiting...</div></div>
    </div>

    <!-- 3. वॉलेट सेक्शन -->
    <div style="background: #181a20; padding: 20px; border-radius: 10px;">
        <button id="walletBtn" onclick="connectWallet()">CONNECT WALLET</button>
    </div>

    <!-- 4. स्क्रिप्ट लिंक -->
    <script src="app.js"></script>
</body>
</html>
