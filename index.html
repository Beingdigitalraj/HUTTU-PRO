<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUTTU PRO - #1 Secure AI Multi-Exchange Trading Bot, Staking & Web3 Gaming</title>
    <meta name="description" content="HUTTU PRO is the world's fastest, safest, and most secure automated 24x7 multi-exchange trading platform.">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #0d0d0d;
            --text-color: #ffffff;
            --primary-color: #d4af37;
            --success-color: #d4af37;
            --secondary-color: #b8860b;
            --danger-color: #f6465d;
            --border-color: #d4af37;
            --shield-color: #d4af37;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }
        header { background-color: var(--card-color); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary-color); }
        .btn-connect { background-color: var(--primary-color); color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .section-title { text-align: center; color: var(--primary-color); margin-top: 50px; text-transform: uppercase; }
        .security-shield-banner { background: #111; border: 1px solid var(--shield-color); border-radius: 10px; padding: 15px; margin: 20px 0; display: flex; justify-content: space-between; }
        .api-panel { background-color: var(--card-color); border: 1px solid var(--primary-color); border-radius: 10px; padding: 30px; margin-top: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background-color: #121418; border: 1px solid var(--border-color); color: white; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background-color: var(--card-color); margin-top: 20px; }
        th, td { padding: 15px; border: 1px solid var(--border-color); text-align: left; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
</head>
<body>

    <header>
        <div class="logo">HUTTU PRO</div>
        <button class="btn-connect" id="walletBtn" onclick="connectWallet()">Connect Wallet</button>
        <span id="wallet-display" style="color:white;">Not Connected</span>
    </header>

    <div class="container">
        <div class="security-shield-banner">
            <div>🛡️ SURAKSHA KAVACH SYSTEM: SECURE</div>
            <div id="firewallLogs">🛡️ 24x7 Multi-Bot Guard Active...</div>
        </div>

        <h2 class="section-title">🔑 Encrypted Multi-Exchange API Setup</h2>
        <div class="api-panel">
            <div class="form-group">
                <label>Select Crypto Exchange</label>
                <select id="exchangeSelect">
                    <option value="Binance">Binance</option>
                    <option value="Bybit">Bybit</option>
                </select>
            </div>
            <div class="form-group">
                <label>Exchange API Key</label>
                <input type="text" id="apiKey" placeholder="Enter API Key...">
            </div>
            <div class="form-group">
                <label>Exchange Secret Key</label>
                <input type="password" id="secretKey" placeholder="Enter Secret Key...">
            </div>
            <button class="btn-connect" style="width: 100%;" onclick="saveExchangeAPI()">Activate 24x7 Auto Trading Bot</button>
            <p id="apiStatus" style="text-align: center; margin-top: 15px; color: var(--primary-color);"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
